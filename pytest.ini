[pytest]
# 最低pytest版本要求
minversion = 8.0.0
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 设置编码
doctest_encoding = utf-8
ini_file_encoding = utf-8

# 设置测试路径和排除项
testpaths = tests
norecursedirs = .git .venv venv env __pycache__ migrations

# 配置日志输出
log_cli = true
log_cli_level = INFO
log_cli_format = [%(levelname)s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记定义
markers =
    slow: 标记为运行缓慢的测试
    integration: 集成测试
    unit: 单元测试
    api: API测试
    db: 数据库相关测试

# 超时设置（秒）
# timeout = 300

# 添加选项
addopts = 
    --no-header 
    --no-summary 
    --capture=no 
    -s 
    -v 
    -q 

# 添加测试的项目路径
pythonpath = .

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
